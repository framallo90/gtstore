services:
  postgres:
    image: postgres:16-alpine
    container_name: geekytreasures-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-geekytreasures}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: geekytreasures-api
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      # Secure default. For local Docker development override with NODE_ENV=development.
      NODE_ENV: ${NODE_ENV:-production}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-geekytreasures}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:4300}
      PORT: ${PORT:-3000}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      EXPECT_REVERSE_PROXY: ${EXPECT_REVERSE_PROXY:-0}
      PROXY_SANITIZES_XFF: ${PROXY_SANITIZES_XFF:-0}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-}
      SWAGGER_PRODUCTION_ALLOWED: ${SWAGGER_PRODUCTION_ALLOWED:-0}
      # Emails transaccionales (optional)
      EMAIL_DRIVER: ${EMAIL_DRIVER:-log}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # Mercado Pago (optional)
      MP_ACCESS_TOKEN_FILE: /run/secrets/mp_access_token
      MP_ENV: ${MP_ENV:-sandbox}
      MP_CURRENCY_ID: ${MP_CURRENCY_ID:-USD}
      STORE_BASE_URL: ${STORE_BASE_URL:-http://localhost:4200}
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      MP_WEBHOOK_SECRET_FILE: /run/secrets/mp_webhook_secret
      # Source paths only for runtime safety checks (non-secret metadata).
      SECRET_SOURCE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PATH:-./.secrets/postgres_password.example}
      SECRET_SOURCE_JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET_PATH:-./.secrets/jwt_access_secret.example}
      SECRET_SOURCE_JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_PATH:-./.secrets/jwt_refresh_secret.example}
      SECRET_SOURCE_MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN_PATH:-./.secrets/mp_access_token.example}
      SECRET_SOURCE_MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET_PATH:-./.secrets/mp_webhook_secret.example}
    secrets:
      - postgres_password
      - jwt_access_secret
      - jwt_refresh_secret
      - mp_access_token
      - mp_webhook_secret
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 30

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
    container_name: geekytreasures-storefront
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '4200:80'

  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: geekytreasures-admin
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '4300:80'

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_PATH:-./.secrets/postgres_password.example}
  jwt_access_secret:
    file: ${JWT_ACCESS_SECRET_PATH:-./.secrets/jwt_access_secret.example}
  jwt_refresh_secret:
    file: ${JWT_REFRESH_SECRET_PATH:-./.secrets/jwt_refresh_secret.example}
  mp_access_token:
    file: ${MP_ACCESS_TOKEN_PATH:-./.secrets/mp_access_token.example}
  mp_webhook_secret:
    file: ${MP_WEBHOOK_SECRET_PATH:-./.secrets/mp_webhook_secret.example}
