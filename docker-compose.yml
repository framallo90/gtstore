services:
  postgres:
    image: postgres:16-alpine
    container_name: geekytreasures-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geekytreasures}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: geekytreasures-api
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      # Local: keep cookies working over plain HTTP. Production: set NODE_ENV=production + use HTTPS.
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-geekytreasures}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:4300}
      PORT: ${PORT:-3000}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-}
      # Optional: used only by prisma seed to create an admin user in local environments.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Optional: force seed execution at container start (recommended only for local/first-run).
      RUN_SEED: ${RUN_SEED:-}
      # Emails transaccionales (optional)
      EMAIL_DRIVER: ${EMAIL_DRIVER:-log}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # Mercado Pago (optional)
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_ENV: ${MP_ENV:-sandbox}
      MP_CURRENCY_ID: ${MP_CURRENCY_ID:-USD}
      STORE_BASE_URL: ${STORE_BASE_URL:-http://localhost:4200}
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 30

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
    container_name: geekytreasures-storefront
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '4200:80'

  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: geekytreasures-admin
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '4300:80'

volumes:
  postgres_data:
